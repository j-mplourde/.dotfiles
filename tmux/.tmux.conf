# Set the default terminal terminfo
set -g default-terminal "screen-256color"
# Enable true color (24-bit RGB) for Neovim termguicolors
set-option -a terminal-features 'screen-256color:RGB'
# Enable scrolling
set -g mouse on

# Changer leader key from Ctrl+b to Ctrl+a
set -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

# Reduce Esc delay so Neovim feels responsive in insert mode
set-option -sg escape-time 10
# Forward focus events to Neovim (enables :autoread, etc.)
set-option -g focus-events on
